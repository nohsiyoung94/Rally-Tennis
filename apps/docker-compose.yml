version: "3.8"

services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend/src:/app/src
    environment:
      - NODE_ENV=development

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./apps/cms/src:/app/src
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
