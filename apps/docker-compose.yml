version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.js:/app/next.config.js
    environment:
      - NODE_ENV=development

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./cms/src:/app/src
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
